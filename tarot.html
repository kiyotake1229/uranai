<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      background: #0a0a1a;
      color: #e9d5ff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(88, 28, 135, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(109, 40, 217, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(67, 20, 100, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: #e9d5ff;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: var(--min); }
      to   { opacity: var(--max); }
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 52px 20px 80px;
      position: relative;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #f0abfc, #c084fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    header p {
      color: #a78bfa;
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      opacity: 0.85;
    }

    /* 質問入力 */
    .question-section {
      background: linear-gradient(135deg, rgba(45,27,105,0.5), rgba(15,10,40,0.7));
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 32px;
      text-align: center;
    }
    .question-label {
      font-size: 0.85rem;
      color: #a78bfa;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }
    .question-input {
      width: 100%;
      background: rgba(15,10,40,0.6);
      border: 1px solid rgba(139,92,246,0.35);
      border-radius: 10px;
      color: #e9d5ff;
      font-family: inherit;
      font-size: 1rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.3s;
      text-align: center;
    }
    .question-input::placeholder { color: #6d28d9; opacity: 0.7; }
    .question-input:focus { border-color: rgba(192,132,252,0.6); }

    /* スプレッド選択 */
    .spread-options {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .spread-btn {
      background: rgba(45,27,105,0.4);
      border: 1px solid rgba(139,92,246,0.35);
      border-radius: 24px;
      color: #c4b5fd;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 8px 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .spread-btn:hover, .spread-btn.active {
      background: rgba(109,40,217,0.4);
      border-color: rgba(192,132,252,0.6);
      color: #f0abfc;
    }

    /* 占うボタン */
    .btn-divine {
      display: block;
      width: 100%;
      max-width: 320px;
      margin: 28px auto 0;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      border: none;
      border-radius: 50px;
      color: #f3e8ff;
      font-family: inherit;
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(109,40,217,0.4);
    }
    .btn-divine:hover {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      box-shadow: 0 6px 28px rgba(139,92,246,0.5);
      transform: translateY(-2px);
    }

    /* カードデッキ演出 */
    .deck-area {
      text-align: center;
      padding: 48px 0;
      display: none;
    }
    .deck-area.show { display: block; }
    .deck-card {
      display: inline-block;
      width: 80px;
      height: 130px;
      background: linear-gradient(135deg, #2d1b69, #1a0a3e);
      border: 2px solid rgba(139,92,246,0.5);
      border-radius: 10px;
      margin: 0 6px;
      position: relative;
      cursor: pointer;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      animation: dealIn 0.5s ease forwards;
      animation-delay: var(--delay);
      opacity: 0;
      transform: translateY(30px);
    }
    @keyframes dealIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .deck-card-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      opacity: 0.6;
    }
    .deck-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 32px rgba(139,92,246,0.4);
    }
    .deck-hint {
      margin-top: 20px;
      color: #a78bfa;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      opacity: 0.8;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* 結果 */
    #result { display: none; }
    #result.show { display: block; }

    .result-question {
      text-align: center;
      font-size: 0.9rem;
      color: #a78bfa;
      letter-spacing: 0.06em;
      margin-bottom: 32px;
      opacity: 0.85;
    }
    .result-question span {
      color: #c084fc;
      font-size: 1rem;
    }

    .spread-label {
      text-align: center;
      font-size: 0.78rem;
      letter-spacing: 0.15em;
      color: #7c3aed;
      margin-bottom: 24px;
    }

    /* カード表示 */
    .cards-row {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .card-result {
      flex: 1;
      min-width: 180px;
      max-width: 220px;
      background: linear-gradient(160deg, rgba(45,27,105,0.55), rgba(15,10,40,0.8));
      border: 1px solid rgba(139,92,246,0.35);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeUp 0.6s ease forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .card-result:nth-child(1) { animation-delay: 0.1s; }
    .card-result:nth-child(2) { animation-delay: 0.3s; }
    .card-result:nth-child(3) { animation-delay: 0.5s; }

    .card-position {
      background: rgba(109,40,217,0.25);
      border-bottom: 1px solid rgba(139,92,246,0.25);
      text-align: center;
      padding: 8px;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: #a78bfa;
    }

    .card-face {
      padding: 24px 16px 20px;
      text-align: center;
    }

    .card-symbol {
      font-size: 44px;
      display: block;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 10px rgba(192,132,252,0.4));
    }

    .card-number {
      font-size: 0.72rem;
      color: #7c3aed;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }

    .card-name {
      font-size: 1.05rem;
      color: #f3e8ff;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    .card-orientation {
      font-size: 0.72rem;
      padding: 2px 10px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 16px;
    }
    .upright   { background: rgba(139,92,246,0.2); color: #c084fc; border: 1px solid rgba(139,92,246,0.35); }
    .reversed  { background: rgba(220,38,38,0.12); color: #f87171; border: 1px solid rgba(220,38,38,0.25); }

    .card-meaning {
      font-size: 0.83rem;
      color: #c4b5fd;
      line-height: 1.8;
      text-align: left;
      opacity: 0.9;
    }

    /* 総合メッセージ */
    .overall-message {
      background: linear-gradient(135deg, rgba(45,27,105,0.5), rgba(15,10,40,0.7));
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 16px;
      padding: 28px 24px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.7s ease forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    .overall-title {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: #a78bfa;
      margin-bottom: 14px;
    }
    .overall-text {
      font-size: 0.95rem;
      color: #e9d5ff;
      line-height: 1.9;
    }

    .btn-line-small { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; max-width: 320px; margin: 0 auto 14px; padding: 14px; background: #06C755; border-radius: 50px; color: #fff; text-decoration: none; font-family: inherit; font-size: 0.92rem; font-weight: bold; letter-spacing: 0.06em; transition: all 0.2s; box-shadow: 0 4px 16px rgba(6,199,85,0.3); }
    .btn-line-small:hover { background: #05a847; transform: translateY(-1px); }
    .other-uranai { margin: 28px 0 8px; text-align: center; }
    .other-uranai-title { font-size: 0.78rem; letter-spacing: 0.15em; color: #7c3aed; margin-bottom: 14px; }

    .other-uranai-links a:hover { background: rgba(109,40,217,0.4); border-color: rgba(192,132,252,0.5); color: #f0abfc; }

    .btn-share {

      cursor: pointer;

    .btn-retry {

      font-family: inherit;

    .back-link {
      display: block;
      text-align: center;
      color: #7c3aed;

      opacity: 0.7;

      margin-bottom: 0;
    }
    .back-link:hover { opacity: 1; }

    footer {
      text-align: center;
      margin-top: 56px;
      color: #6d28d9;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      opacity: 0.6;
    }
  </style>
</head>

    const keywords = drawnCards.map(c => c.reversed ? c.card.reversed.keyword : c.card.upright.keyword);

    if (spreadType === 1) {
      return `今日のカードは「${names[0]}」。${keywords[0]}のエネルギーがあなたを包んでいます。このカードのメッセージを胸に、今日一日を過ごしてみてください。`;
    }

    const hasPositive = drawnCards.filter(c => !c.reversed).length;
    const tone = hasPositive >= 2
      ? "全体的にポジティブなエネルギーが流れています。"
      : "今は内省と立て直しのタイミングです。";

    return `${tone}過去に「${names[0]}」、現在に「${names[1]}」、未来に「${names[2]}」が示されました。${keywords[1]}という現在の状況を踏まえ、${keywords[2]}の方向へと歩みを進めることで、状況はより良い方向へと向かっていくでしょう。`;
  }

  // =====================================================
  // UI ロジック
  // =====================================================
  let currentSpread = 3;

  document.querySelectorAll('.spread-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.spread-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSpread = parseInt(btn.dataset.spread);
    });
  });

  document.getElementById('divine-btn').addEventListener('click', () => {
    document.getElementById('form-section').style.display = 'none';
    showDeck();
  });

  function showDeck() {
    const area = document.getElementById('deck-area');
    const deckCards = document.getElementById('deck-cards');
    area.classList.add('show');
    deckCards.innerHTML = '';

    const count = currentSpread;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'deck-card';
      el.style.setProperty('--delay', `${i * 0.15}s`);
      el.dataset.index = i;
      el.innerHTML = '<span class="deck-card-icon">🔮</span>';
      el.addEventListener('click', onCardClick);
      deckCards.appendChild(el);
    }
  }

  let flipped = 0;
  let drawnCards = [];

  function onCardClick(e) {
    const el = e.currentTarget;
    if (el.dataset.flipped) return;
    el.dataset.flipped = '1';
    el.removeEventListener('click', onCardClick);

    // カードを決定
    const remaining = tarotCards.filter(c => !drawnCards.find(d => d.card.name === c.name));
    const card = remaining[Math.floor(Math.random() * remaining.length)];
    const reversed = Math.random() < 0.35;
    drawnCards.push({ card, reversed });

    el.style.background = 'linear-gradient(135deg, rgba(109,40,217,0.5), rgba(45,27,105,0.7))';
    el.style.transform = 'translateY(-8px) scale(1.05)';
    el.style.borderColor = 'rgba(192,132,252,0.7)';

    flipped++;
    if (flipped === currentSpread) {
      setTimeout(showResult, 600);
    }
  }

  function showResult() {
    document.getElementById('deck-area').classList.remove('show');
    document.getElementById('result').classList.add('show');

    const question = document.getElementById('question').value.trim();
    const spread = spreads[currentSpread];

    document.getElementById('result-question').innerHTML = question
      ? `「<span>${question}</span>」についての答え`
      : '今のあなたへのメッセージ';
    document.getElementById('spread-label').textContent = `✦ ${spread.label} ✦`;

    const row = document.getElementById('cards-row');
    row.innerHTML = '';
    drawnCards.forEach((item, i) => {
      const { card, reversed } = item;
      const data = reversed ? card.reversed : card.upright;
      const posLabel = spread.positions[i];

      const el = document.createElement('div');
      el.className = 'card-result';
      el.style.animationDelay = `${i * 0.2 + 0.1}s`;
      el.innerHTML = `
        <div class="card-position">${posLabel}</div>
        <div class="card-face">
          <span class="card-symbol" style="${reversed ? 'transform:rotate(180deg);display:inline-block;' : ''}">${card.symbol}</span>
          <p class="card-number">${card.number}</p>
          <p class="card-name">${card.name}</p>
          <span class="card-orientation ${reversed ? 'reversed' : 'upright'}">${reversed ? '逆位置' : '正位置'}</span>
          <p class="card-meaning"><strong style="color:#c084fc;font-size:0.78rem;">${data.keyword}</strong><br><br>${data.meaning}</p>
        </div>
      `;
      row.appendChild(el);
    });

    document.getElementById('overall-text').textContent = buildOverallMessage(drawnCards, currentSpread);

    // シェアボタン
    document.getElementById('share-btn').onclick = () => {
      const names = drawnCards.map(c => c.card.name + (c.reversed ? '(逆)' : '')).join(' / ');
      const text = `🃏タロット占いの結果\n引いたカード: ${names}\n\n#タロット占い #占いの館`;
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`);
    };
  }

  document.getElementById('retry-btn').addEventListener('click', () => {
    flipped = 0;
    drawnCards = [];
    document.getElementById('result').classList.remove('show');
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('question').value = '';
  });

  // 星生成
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*100}%; left:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;
      --min:${0.1+Math.random()*0.3};
      --max:${0.5+Math.random()*0.5};
      animation-delay:${Math.random()*4}s;
    `;
    starsEl.appendChild(s);
  }
  </script>
</body>
</html>
