<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 背景 -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <radialGradient id="moon" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f5e6ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </radialGradient>
  </defs>

  <!-- 背景円 -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- 星（小） -->
  <circle cx="12" cy="14" r="1.2" fill="#e9d5ff" opacity="0.9"/>
  <circle cx="52" cy="10" r="1" fill="#e9d5ff" opacity="0.8"/>
  <circle cx="56" cy="28" r="1.2" fill="#e9d5ff" opacity="0.7"/>
  <circle cx="8"  cy="38" r="1"   fill="#e9d5ff" opacity="0.8"/>
  <circle cx="18" cy="52" r="1.2" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="50" cy="50" r="1"   fill="#e9d5ff" opacity="0.7"/>
  <circle cx="44" cy="18" r="0.8" fill="#e9d5ff" opacity="0.9"/>
  <circle cx="22" cy="10" r="0.8" fill="#e9d5ff" opacity="0.7"/>

  <!-- 四芒星（キラキラ） -->
  <g fill="#f0abfc" opacity="0.85">
    <polygon points="54,40 55.2,42 54,44 52.8,42" />
    <polygon points="54,40 56,41.2 54,44 52,41.2" transform="rotate(45,54,42)"/>
  </g>
  <g fill="#e9d5ff" opacity="0.7">
    <polygon points="10,22 11,23.8 10,25.6 9,23.8"/>
    <polygon points="10,22 11.8,23.8 10,25.6 8.2,23.8" transform="rotate(45,10,23.8)"/>
  </g>

  <!-- 三日月 -->
  <circle cx="33" cy="31" r="16" fill="url(#moon)"/>
  <circle cx="39" cy="27" r="12" fill="#1a0a3e"/>

  <!-- 月の輝き -->
  <circle cx="26" cy="24" r="2" fill="#ffffff" opacity="0.35"/>
</svg>
