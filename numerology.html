      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 100%);
    }

    .stars::before {
      content: '';
      position: absolute;
      width: 100%; height: 100%;
      background-image:
        radial-gradient(1px 1px at 10% 20%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 50%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 30%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 70%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 40%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 60%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 90%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 45%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 65%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 15%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 75%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 35%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 25%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  85%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 95%  5%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 15%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 55%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 85%, #fff 0%, transparent 100%);
      opacity: 0.6;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 40px 0 30px;
    }

    header .icon {
      font-size: 48px;
      display: block;
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    header h1 {
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 4px;
      color: #d4b8ff;
      text-shadow: 0 0 20px rgba(180, 130, 255, 0.5);

    header p {
      margin-top: 8px;
      font-size: 13px;
      color: #9080b0;
      letter-spacing: 2px;

      border: 1px solid rgba(180, 130, 255, 0.2);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      color: #b09ad5;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .date-inputs {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      align-items: flex-end;
    }

    .date-field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .date-field span {
      font-size: 11px;
      color: #7060a0;
      letter-spacing: 1px;
    }

      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(180, 130, 255, 0.3);
      border-radius: 10px;
      color: #e0d5f5;
      padding: 12px 10px;
      font-size: 18px;
      text-align: center;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    .date-field input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .date-field input:focus {
      border-color: #a855f7;
    }

    .date-sep {
      font-size: 22px;
      color: #6040a0;
      padding-bottom: 12px;
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4);
    }

    .btn-submit:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(180, 130, 255, 0.15);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #9080b0;
      letter-spacing: 1px;
      line-height: 1.8;
    }

    .calc-box span.highlight {
      color: #d4b8ff;
      font-weight: bold;
    }

    /* 結果 */
    #result { display: none; }

    .result-header {
      text-align: center;
      margin-bottom: 24px;
    }

      font-size: 72px;
      font-weight: bold;
      background: linear-gradient(135deg, #c084fc, #f0abfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      display: block;
      margin-bottom: 4px;
      filter: drop-shadow(0 0 20px rgba(192, 132, 252, 0.5));
      animation: pulse 2s ease-in-out infinite;

      display: inline-block;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 30px;
      padding: 6px 18px;
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .result-title {
      font-size: 18px;
      color: #d4b8ff;
      letter-spacing: 2px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(180, 130, 255, 0.2);
      margin: 20px 0;
    }

    .fortune-section { margin-bottom: 20px; }

    .fortune-section h3 {
      font-size: 12px;
      color: #a080d0;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .fortune-section p {
      font-size: 15px;
      line-height: 1.9;
      color: #e0d5f5;
    }

    .stars-row { color: #f5c842; font-size: 16px; letter-spacing: 2px; }

    .lucky-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .lucky-item {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(180,130,255,0.2);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .lucky-item .lucky-label {
      font-size: 10px;
      color: #9080b0;
      letter-spacing: 2px;
      display: block;
      margin-bottom: 6px;
    }

    .lucky-item .lucky-value {

      color: #d4b8ff;
      font-weight: bold;

      padding: 14px;
      background: rgba(29,161,242,0.15);
      border: 1px solid rgba(29,161,242,0.4);
      border-radius: 14px;
      color: #7bc8f8;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;

    .btn-back {

      background: transparent;
      border: 1px solid rgba(180,130,255,0.3);
      border-radius: 14px;
      color: #b09ad5;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;

      font-size: 11px;

    .error-msg {
      color: #f87171;
      font-size: 12px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>

          { overall: "最高の慈愛エネルギーが溢れる週です。あなたの愛の力が誰かの人生を大きく変えられる瞬間が訪れます。", advice: "「今週一つ、見返りを全く求めずに誰かのために動く」ことをしてみてください。その純粋な愛が宇宙を動かします。", stars: 5, color: "ゴールデンホワイト", item: "クリスタル", number: "33" },
          { overall: "精神的な覚醒が起きる特別な週です。深い洞察と愛の力で、今まで見えなかったものが見えてきます。", advice: "「今週一度、自分への愛と感謝の気持ちを持つ時間を作る」ことをしてください。自分を愛することが他者への愛の源です。", stars: 5, color: "ラベンダーホワイト", item: "瞑想グッズ", number: "6" },
          { overall: "使命の扉が開く週です。あなたの存在そのものが光です。自信を持って愛を与え続けてください。", advice: "「今週一人、深く悩んでいる人の話をとことん聞いてあげる」ことをしてください。あなたの存在が最高の癒しになります。", stars: 5, color: "コズミックゴールド", item: "祈りのアイテム", number: "9" },
        ]
      }
    };

    // 計算ロジック
    function calcLifeNumber(year, month, day) {
      const digits = (String(year) + String(month).padStart(2,'0') + String(day).padStart(2,'0')).split('').map(Number);
      const steps = [];
      let sum = digits.reduce((a, b) => a + b, 0);
      steps.push({ digits, sum });

      while (sum > 9 && sum !== 11 && sum !== 22 && sum !== 33) {
        const ds = String(sum).split('').map(Number);
        sum = ds.reduce((a, b) => a + b, 0);
        steps.push({ digits: ds, sum });
      }
      return { number: sum, steps };
    }

    function buildCalcHTML(year, month, day, steps) {
      const dateStr = `${year}/${String(month).padStart(2,'0')}/${String(day).padStart(2,'0')}`;
      let html = `<div style="margin-bottom:6px;color:#b09ad5;">計算過程</div>`;
      html += `${dateStr.replace(/\//g,' + ')} = <span class="highlight">${steps[0].sum}</span>`;
      for (let i = 1; i < steps.length; i++) {
        html += `&nbsp;&nbsp;→&nbsp;&nbsp;${steps[i].digits.join(' + ')} = <span class="highlight">${steps[i].sum}</span>`;
      }
      if (steps[steps.length-1].sum === 11 || steps[steps.length-1].sum === 22 || steps[steps.length-1].sum === 33) {
        html += `&nbsp; <span class="highlight">✨ マスターナンバー</span>`;
      }
      return html;
    }

    // 入力バリデーション
    const yearEl  = document.getElementById('inp-year');
    const monthEl = document.getElementById('inp-month');
    const dayEl   = document.getElementById('inp-day');
    const submitEl = document.getElementById('submit-btn');
    const errorEl  = document.getElementById('error-msg');

    function validate() {
      const y = parseInt(yearEl.value);
      const m = parseInt(monthEl.value);
      const d = parseInt(dayEl.value);
      if (!yearEl.value || !monthEl.value || !dayEl.value) { submitEl.disabled = true; return; }
      const date = new Date(y, m-1, d);
      const valid = date.getFullYear()===y && date.getMonth()===m-1 && date.getDate()===d && y>=1900 && y<=2025;
      submitEl.disabled = !valid;
      errorEl.style.display = valid ? 'none' : 'block';
    }

    [yearEl, monthEl, dayEl].forEach(el => el.addEventListener('input', validate));

    // 占う
    document.getElementById('submit-btn').addEventListener('click', () => {
      const y = parseInt(yearEl.value);
      const m = parseInt(monthEl.value);
      const d = parseInt(dayEl.value);
      const { number, steps } = calcLifeNumber(y, m, d);
      const data = numerology[number];
      if (!data) return;

      const pair = data.weeklyPairs[Math.floor(Math.random() * data.weeklyPairs.length)];

      document.getElementById('result-badge').textContent = `誕生数 ${number}`;
      document.getElementById('life-number').textContent = number;
      document.getElementById('result-keyword').textContent = data.keyword;
      document.getElementById('calc-steps').innerHTML = buildCalcHTML(y, m, d, steps);
      document.getElementById('result-personality').textContent = data.personality;
      document.getElementById('result-love').textContent = data.love;
      document.getElementById('result-work').textContent = data.work;
      document.getElementById('result-overall').textContent = pair.overall;
      document.getElementById('result-advice').textContent = pair.advice;
      document.getElementById('result-stars').textContent = '★'.repeat(pair.stars) + '☆'.repeat(5 - pair.stars);
      document.getElementById('result-color').textContent = pair.color;
      document.getElementById('result-item').textContent = pair.item;
      document.getElementById('result-number').textContent = pair.number;

      document.getElementById('form-section').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      document.getElementById('result').style.display = 'none';
      document.getElementById('form-section').style.display = 'block';
    });

    document.getElementById('share-btn').addEventListener('click', () => {
      const num = document.getElementById('life-number').textContent;
      const kw  = document.getElementById('result-keyword').textContent;
      const color = document.getElementById('result-color').textContent;
      const text = `【数秘術占い】\n私の誕生数は「${num}」\n${kw}\n\nラッキーカラー：${color}\n\n#数秘術 #誕生数占い`;
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
    });
  </script>
</body>
