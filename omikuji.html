<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎋 おみくじ | 占いの館</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      background: #0a0a1a;
      color: #e9d5ff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(88,28,135,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(109,40,217,0.12) 0%, transparent 50%);
      pointer-events: none;
    }

    .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .star {
      position: absolute;
      background: #e9d5ff;
      border-radius: 50%;
      animation: twinkle var(--dur) ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      from { opacity: var(--min); }
      to   { opacity: var(--max); }
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 52px 20px 80px;
      position: relative;
    }

    header { text-align: center; margin-bottom: 48px; }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #f0abfc, #c084fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }
    header p { color: #a78bfa; font-size: 0.92rem; letter-spacing: 0.08em; opacity: 0.85; }

    /* おみくじ筒 */
    .shrine-area {
      text-align: center;
      margin-bottom: 40px;
    }

    .omikuji-box {
      display: inline-block;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    .omikuji-tube {
      width: 100px;
      height: 160px;
      background: linear-gradient(180deg, #2d1b69 0%, #1a0a3e 100%);
      border: 2px solid rgba(192,132,252,0.5);
      border-radius: 12px 12px 6px 6px;
      margin: 0 auto 24px;
      position: relative;
      transition: transform 0.1s;
      box-shadow: 0 8px 32px rgba(109,40,217,0.3);
    }

    .omikuji-tube::before {
      content: '御\A神\Aく\Aじ';
      white-space: pre;
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      color: rgba(192,132,252,0.6);
      writing-mode: vertical-rl;
      text-align: center;
    }

    .omikuji-tube::after {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 14px;
      background: linear-gradient(180deg, #4c1d95, #2d1b69);
      border: 2px solid rgba(192,132,252,0.5);
      border-radius: 4px;
    }

    .shake { animation: shake 0.5s ease; }
    @keyframes shake {
      0%,100% { transform: rotate(0deg); }
      20% { transform: rotate(-8deg) translateY(-4px); }
      40% { transform: rotate(8deg) translateY(-8px); }
      60% { transform: rotate(-6deg) translateY(-4px); }
      80% { transform: rotate(6deg) translateY(-2px); }
    }

    .btn-draw {
      display: block;
      width: 100%;
      max-width: 280px;
      margin: 0 auto;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      border: none;
      border-radius: 50px;
      color: #f3e8ff;
      font-family: inherit;
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(109,40,217,0.4);
    }
    .btn-draw:hover {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(139,92,246,0.5);
    }

    /* 結果 */
    #result { display: none; }
    #result.show { display: block; animation: fadeUp 0.6s ease forwards; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-paper {
      background: linear-gradient(160deg, rgba(45,27,105,0.55), rgba(15,10,40,0.8));
      border: 1px solid rgba(139,92,246,0.35);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .fortune-header {
      padding: 36px 24px 28px;
      text-align: center;
      border-bottom: 1px solid rgba(139,92,246,0.2);
    }

    .fortune-level {
      font-size: 4rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      display: block;
      margin-bottom: 8px;
      line-height: 1.1;
    }

    .fortune-level-en {
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      opacity: 0.6;
    }

    .fortune-body {
      padding: 24px;
    }

    .fortune-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(139,92,246,0.12);
    }
    .fortune-row:last-child { border-bottom: none; }

    .fortune-label {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      color: #a78bfa;
      white-space: nowrap;
      padding-top: 2px;
      min-width: 56px;
    }

    .fortune-stars {
      font-size: 0.9rem;
      color: #fbbf24;
      white-space: nowrap;
      padding-top: 2px;
    }

    .fortune-text {
      font-size: 0.9rem;
      color: #e9d5ff;
      line-height: 1.8;
    }

    .fortune-advice {
      margin-top: 4px;
      padding: 16px;
      background: rgba(109,40,217,0.15);
      border: 1px solid rgba(139,92,246,0.25);
      border-radius: 12px;
      font-size: 0.88rem;
      color: #c4b5fd;
      line-height: 1.85;
      text-align: center;
    }

    .btn-retry {
      display: block;
      width: 100%;
      max-width: 280px;
      margin: 0 auto 14px;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      border: none;
      border-radius: 50px;
      color: #f3e8ff;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-retry:hover { opacity: 0.85; transform: translateY(-1px); }

    .btn-share {
      display: block;
      width: 100%;
      max-width: 280px;
      margin: 0 auto 24px;
      padding: 14px;
      background: #1a1a2e;
      border: 1px solid rgba(139,92,246,0.4);
      border-radius: 50px;
      color: #c4b5fd;
      font-family: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-share:hover { background: rgba(45,27,105,0.5); }

    .back-link {
      display: block;
      text-align: center;
      color: #7c3aed;
      font-size: 0.85rem;
      text-decoration: none;
      letter-spacing: 0.08em;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }

    footer {
      text-align: center;
      margin-top: 56px;
      color: #6d28d9;
      font-size: 0.78rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="container">
    <header>
      <h1>🎋 おみくじ</h1>
      <p>筒を振って、今日の運勢を引いてください</p>
    </header>

    <div id="form-section">
      <div class="shrine-area">
        <div class="omikuji-box" id="tube-box">
          <div class="omikuji-tube" id="tube"></div>
        </div>
      </div>
      <button class="btn-draw" id="draw-btn">🎋 おみくじを引く</button>
    </div>

    <div id="result">
      <div class="result-paper">
        <div class="fortune-header">
          <span class="fortune-level" id="fortune-level"></span>
          <span class="fortune-level-en" id="fortune-level-en"></span>
        </div>
        <div class="fortune-body">
          <div class="fortune-row">
            <span class="fortune-label">総合運</span>
            <span class="fortune-stars" id="stars-overall"></span>
            <span class="fortune-text" id="text-overall"></span>
          </div>
          <div class="fortune-row">
            <span class="fortune-label">恋愛運</span>
            <span class="fortune-stars" id="stars-love"></span>
            <span class="fortune-text" id="text-love"></span>
          </div>
          <div class="fortune-row">
            <span class="fortune-label">仕事運</span>
            <span class="fortune-stars" id="stars-work"></span>
            <span class="fortune-text" id="text-work"></span>
          </div>
          <div class="fortune-row">
            <span class="fortune-label">金運</span>
            <span class="fortune-stars" id="stars-money"></span>
            <span class="fortune-text" id="text-money"></span>
          </div>
          <div class="fortune-row">
            <span class="fortune-label">健康運</span>
            <span class="fortune-stars" id="stars-health"></span>
            <span class="fortune-text" id="text-health"></span>
          </div>
        </div>
        <div class="fortune-advice" id="fortune-advice"></div>
      </div>

      <button class="btn-retry" id="retry-btn">🎋 もう一度引く</button>
      <button class="btn-share" id="share-btn">𝕏 結果をシェアする</button>
      <a class="back-link" href="index.html">🔮 占いTOPへ戻る</a>
    </div>

    <footer>© おみくじ | 娯楽目的のコンテンツです</footer>
  </div>

  <script>
  const omikujiData = [
    {
      level: "大吉", en: "GREAT BLESSING", color: "#fbbf24", weight: 8,
      overall:  { stars: "★★★★★", text: "運気は最高潮。何事にも積極的に取り組むことで大きな成果が得られます。迷っていたことはこの機に踏み出してみましょう。" },
      love:     { stars: "★★★★★", text: "素敵な出会いや関係の深まりが期待できます。素直な気持ちを伝えることで縁が結ばれます。" },
      work:     { stars: "★★★★★", text: "努力が認められ、昇進や新プロジェクトのチャンスが巡ってきます。自信を持って挑戦を。" },
      money:    { stars: "★★★★☆", text: "臨時収入や思わぬ恩恵がありそう。ただし過度な出費には注意しましょう。" },
      health:   { stars: "★★★★★", text: "心身ともに充実した時期。この元気を維持するためにも規則正しい生活を心がけて。" },
      advice: "今がまさに動き時。勇気を持って一歩踏み出せば、宇宙があなたを後押しします。"
    },
    {
      level: "中吉", en: "MODERATE BLESSING", color: "#fb923c", weight: 13,
      overall:  { stars: "★★★★☆", text: "概ね順調な流れにあります。丁寧に物事を進めることで良い結果が得られるでしょう。" },
      love:     { stars: "★★★★☆", text: "関係が少しずつ深まっていく時期。焦らず自然体で接することが大切です。" },
      work:     { stars: "★★★★☆", text: "コツコツとした努力が実を結びます。周囲との協力関係を大切にしましょう。" },
      money:    { stars: "★★★☆☆", text: "収支のバランスは良好。計画的な支出を心がければ安定が続きます。" },
      health:   { stars: "★★★★☆", text: "体調は良好。軽い運動を取り入れると更に活力が湧きます。" },
      advice: "着実な積み重ねが未来を作ります。今日できることを丁寧にこなしましょう。"
    },
    {
      level: "小吉", en: "SMALL BLESSING", color: "#a3e635", weight: 18,
      overall:  { stars: "★★★☆☆", text: "小さな幸運が積み重なる時期。大きなことを求めず、身近な喜びに目を向けてみましょう。" },
      love:     { stars: "★★★☆☆", text: "ゆっくりと関係が育まれています。相手のペースを尊重することが吉。" },
      work:     { stars: "★★★☆☆", text: "地道な作業が評価される時。焦らず基礎を固めることに集中しましょう。" },
      money:    { stars: "★★★☆☆", text: "大きな動きはないものの安定しています。節約の習慣をつけると吉。" },
      health:   { stars: "★★★☆☆", text: "疲れが出やすい時期。早めの休息を取り、無理をしないことが大切です。" },
      advice: "小さな幸せを見つける目を持ちましょう。日常の中に喜びは隠れています。"
    },
    {
      level: "吉", en: "BLESSING", color: "#34d399", weight: 22,
      overall:  { stars: "★★★☆☆", text: "穏やかで安定した運気です。派手さはないものの、着実に前進できています。" },
      love:     { stars: "★★★☆☆", text: "安定した関係が続きます。日常の中の小さな気遣いが絆を深めます。" },
      work:     { stars: "★★★☆☆", text: "平穏な時期。新しいスキルを身につける準備期間として活用しましょう。" },
      money:    { stars: "★★★☆☆", text: "収支は安定しています。将来のための貯蓄を少しずつ始めるのに良い時期。" },
      health:   { stars: "★★★☆☆", text: "大きな問題はなし。バランスの良い食事と睡眠を意識しましょう。" },
      advice: "焦らず、今の自分のペースで進むことが一番の近道です。"
    },
    {
      level: "末吉", en: "FUTURE BLESSING", color: "#60a5fa", weight: 18,
      overall:  { stars: "★★☆☆☆", text: "今は種まきの時期。すぐには結果が出なくても、着実に行動することで後に大きく花開きます。" },
      love:     { stars: "★★☆☆☆", text: "今は焦らないことが大切。自分磨きに時間を使うことで、縁が整ってきます。" },
      work:     { stars: "★★★☆☆", text: "下準備をしっかりする時期。今の努力が未来の成功の土台になります。" },
      money:    { stars: "★★☆☆☆", text: "今は慎重に。衝動買いや投機的なことは避け、堅実に行動しましょう。" },
      health:   { stars: "★★☆☆☆", text: "無理は禁物。十分な休息を取り、体を大切にしてください。" },
      advice: "今は実らなくても大丈夫。まいた種はやがて必ず芽吹きます。"
    },
    {
      level: "凶", en: "MISFORTUNE", color: "#c084fc", weight: 13,
      overall:  { stars: "★★☆☆☆", text: "少し運気が低迷する時期です。大きな決断や行動は控え、現状を維持することに集中しましょう。" },
      love:     { stars: "★★☆☆☆", text: "感情的な言動に注意。相手の気持ちに寄り添うことで、関係を守れます。" },
      work:     { stars: "★★☆☆☆", text: "ミスや誤解が起きやすい時期。確認を徹底し、慎重に行動しましょう。" },
      money:    { stars: "★☆☆☆☆", text: "出費が増えやすい時期。大きな買い物や投資は時期を改めましょう。" },
      health:   { stars: "★★☆☆☆", text: "体調を崩しやすい時期。早寝早起き、バランスの良い食事を心がけて。" },
      advice: "今は嵐の中。じっと耐えることも知恵です。必ず晴れ間がやってきます。"
    },
    {
      level: "大凶", en: "GREAT MISFORTUNE", color: "#f87171", weight: 8,
      overall:  { stars: "★☆☆☆☆", text: "運気が最も低い時期ですが、これが底です。新しいことを始めるより、今あるものを大切に守る時。" },
      love:     { stars: "★☆☆☆☆", text: "誤解や行き違いが生じやすい時期。焦らず、今は自分自身を整えることを優先して。" },
      work:     { stars: "★☆☆☆☆", text: "慎重さが求められます。目立った行動は控え、基礎を固めることに専念しましょう。" },
      money:    { stars: "★☆☆☆☆", text: "金銭トラブルに要注意。保証人や貸し借りは避け、財布の紐をしっかり締めて。" },
      health:   { stars: "★★☆☆☆", text: "ストレスが溜まりやすい時期。無理をせず、心身のケアを最優先にしてください。" },
      advice: "大凶を引いた人は、あとは上がるだけ。どんな夜も朝を迎えます。勇気を持って。"
    }
  ];

  function drawOmikuji() {
    const totalWeight = omikujiData.reduce((sum, d) => sum + d.weight, 0);
    let rand = Math.random() * totalWeight;
    for (const d of omikujiData) {
      rand -= d.weight;
      if (rand <= 0) return d;
    }
    return omikujiData[0];
  }

  document.getElementById('draw-btn').addEventListener('click', () => {
    const tube = document.getElementById('tube');
    tube.classList.remove('shake');
    void tube.offsetWidth;
    tube.classList.add('shake');

    setTimeout(() => {
      const result = drawOmikuji();
      showResult(result);
    }, 500);
  });

  function showResult(d) {
    document.getElementById('form-section').style.display = 'none';
    const resultEl = document.getElementById('result');
    resultEl.classList.add('show');

    const levelEl = document.getElementById('fortune-level');
    levelEl.textContent = d.level;
    levelEl.style.color = d.color;
    levelEl.style.textShadow = `0 0 24px ${d.color}66`;
    document.getElementById('fortune-level-en').textContent = d.en;

    document.getElementById('stars-overall').textContent = d.overall.stars;
    document.getElementById('text-overall').textContent = d.overall.text;
    document.getElementById('stars-love').textContent = d.love.stars;
    document.getElementById('text-love').textContent = d.love.text;
    document.getElementById('stars-work').textContent = d.work.stars;
    document.getElementById('text-work').textContent = d.work.text;
    document.getElementById('stars-money').textContent = d.money.stars;
    document.getElementById('text-money').textContent = d.money.text;
    document.getElementById('stars-health').textContent = d.health.stars;
    document.getElementById('text-health').textContent = d.health.text;
    document.getElementById('fortune-advice').textContent = d.advice;

    document.getElementById('share-btn').onclick = () => {
      const text = `🎋 おみくじの結果：${d.level}\n${d.advice}\n\n#おみくじ #占いの館`;
      window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`);
    };
  }

  document.getElementById('retry-btn').addEventListener('click', () => {
    document.getElementById('result').classList.remove('show');
    document.getElementById('result').style.display = 'none';
    document.getElementById('form-section').style.display = 'block';
  });

  // 星生成
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--min:${0.1+Math.random()*0.3};--max:${0.5+Math.random()*0.5};animation-delay:${Math.random()*4}s;`;
    starsEl.appendChild(s);
  }
  </script>
</body>
</html>
