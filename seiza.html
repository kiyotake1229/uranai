      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      background: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 100%);
    }

    .stars::before {
      content: '';
      position: absolute;
      width: 100%; height: 100%;
      background-image:
        radial-gradient(1px 1px at 10% 20%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 50%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 30%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 70%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 40%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 60%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 90%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 45%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 65%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 15%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 75%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 35%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 55%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 25%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 85%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 5%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 15%, #fff 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 85%, #fff 0%, transparent 100%);
      opacity: 0.6;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 600px;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 40px 0 30px;
    }

    header .moon {
      font-size: 48px;
      display: block;
      margin-bottom: 10px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    header h1 {
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 4px;
      color: #d4b8ff;
      text-shadow: 0 0 20px rgba(180, 130, 255, 0.5);
    }

    header p {
      margin-top: 8px;
      font-size: 13px;
      color: #9080b0;
      letter-spacing: 2px;
    }

      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(180, 130, 255, 0.2);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
      margin-bottom: 20px;
    }

    .form-section label {
      display: block;
      font-size: 13px;
      color: #b09ad5;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .select-grid {
      display: grid;

      gap: 8px;
      margin-bottom: 24px;
    }

    .select-grid.zodiac-grid {

    }

      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(180, 130, 255, 0.3);
      border-radius: 10px;
      color: #d4b8ff;
      padding: 10px 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .btn-option:hover {
      background: rgba(180, 130, 255, 0.15);
      border-color: rgba(180, 130, 255, 0.6);
    }

    .btn-option.selected {
      background: rgba(180, 130, 255, 0.3);
      border-color: #b482ff;
      color: #fff;
      box-shadow: 0 0 12px rgba(180, 130, 255, 0.4);
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);

    }

    .btn-submit:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .result-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .result-badge {

      background: linear-gradient(135deg, #7c3aed, #a855f7);
      border-radius: 30px;
      padding: 8px 20px;
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }

    .result-header h2 {
      font-size: 22px;
      color: #d4b8ff;
      text-shadow: 0 0 15px rgba(180, 130, 255, 0.4);
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(180, 130, 255, 0.2);
      margin: 20px 0;
    }

    .fortune-section {
      margin-bottom: 20px;
    }

    .fortune-section h3 {
      font-size: 12px;
      color: #a080d0;
      letter-spacing: 3px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .fortune-section p {
      font-size: 15px;
      line-height: 1.9;
      color: #e0d5f5;
    }

    .lucky-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .lucky-item {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(180, 130, 255, 0.2);
      border-radius: 12px;
      padding: 12px;

      display: block;
      margin-bottom: 6px;

    .lucky-item .lucky-value {

      color: #d4b8ff;
      font-weight: bold;
    }

    .lucky-color-dot {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .advice-box {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(168, 85, 247, 0.1));
      border: 1px solid rgba(180, 130, 255, 0.35);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 20px;
    }

    .advice-box h3 {
      font-size: 12px;
      color: #c4a0ff;
      letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .advice-box p {
      font-size: 14px;
      line-height: 1.9;
      color: #e8deff;
    }

    .overall-score {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .stars-row {
      color: #f5c842;
      font-size: 16px;
      letter-spacing: 2px;
    }

    .btn-share {
      width: 100%;
      padding: 14px;
      background: rgba(29, 161, 242, 0.15);
      border: 1px solid rgba(29, 161, 242, 0.4);
      border-radius: 14px;
      color: #7bc8f8;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;

    .btn-share:hover {

    }

    .btn-back {

      padding: 14px;
      background: transparent;
      border: 1px solid rgba(180, 130, 255, 0.3);
      border-radius: 14px;
      color: #b09ad5;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }

    .btn-back:hover {
      background: rgba(180, 130, 255, 0.1);
    }

    footer {
      text-align: center;
      padding: 30px 0;
      font-size: 11px;
      color: #50406a;
      letter-spacing: 1px;
    }
  </style>
</head>

        overall: "今のあなたは運気が上昇傾向にあります。準備してきたことが形になりやすい時期です。少し慎重になりすぎているなら、今こそ一歩踏み出すタイミング。焦らず、でも止まらず前へ進みましょう。",

    Object.keys(fortunes).forEach(key => {
      const d = fortunes[key];
      d.weeklyPairs = [
        { overall: d.overall, advice: d.advice, stars: d.stars, color: d.color, item: d.item, number: d.number },
        ...(additionalPairs[key] || [])
      ];
    });

    let selectedBlood = null;
    let selectedZodiac = null;

    // 血液型選択
    document.querySelectorAll('#blood-grid .btn-option').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#blood-grid .btn-option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedBlood = btn.dataset.value;
        checkReady();
      });
    });

    // 星座選択
    document.querySelectorAll('#zodiac-grid .btn-option').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#zodiac-grid .btn-option').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedZodiac = btn.dataset.value;
        checkReady();
      });
    });

    function checkReady() {
      document.getElementById('submit-btn').disabled = !(selectedBlood && selectedZodiac);
    }

    document.getElementById('submit-btn').addEventListener('click', () => {
      const key = `${selectedBlood}_${selectedZodiac}`;
      const data = fortunes[key];
      if (!data) return;

      document.getElementById('result-badge').textContent = `${selectedBlood}型 × ${selectedZodiac}`;
      document.getElementById('result-title').textContent = '星が示すあなたの運命';
      const pair = data.weeklyPairs[Math.floor(Math.random() * data.weeklyPairs.length)];
      document.getElementById('result-personality').textContent = data.personality;
      document.getElementById('result-love').textContent = data.love;
      document.getElementById('result-work').textContent = data.work;
      document.getElementById('result-overall').textContent = pair.overall;
      document.getElementById('result-advice').textContent = pair.advice;
      document.getElementById('result-stars').textContent = '★'.repeat(pair.stars) + '☆'.repeat(5 - pair.stars);
      document.getElementById('result-color').textContent = pair.color;
      document.getElementById('result-item').textContent = pair.item;
      document.getElementById('result-number').textContent = pair.number;

      document.getElementById('form-section').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    document.getElementById('back-btn').addEventListener('click', () => {
      document.getElementById('result').style.display = 'none';
      document.getElementById('form-section').style.display = 'block';
    });

    document.getElementById('share-btn').addEventListener('click', () => {
      const text = `【星座×血液型占い】\n${selectedBlood}型×${selectedZodiac}の私の結果✨\n\nラッキーカラー：${fortunes[`${selectedBlood}_${selectedZodiac}`].color}\nラッキーナンバー：${fortunes[`${selectedBlood}_${selectedZodiac}`].number}\n\n#星座占い #血液型占い`;
      const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
      window.open(url, '_blank');
